# Gate the editor tools behind a password (form + cookie login; see
# netlify/edge-functions/editor-auth.js). The rest of the site stays public.
# Build command and publish directory remain as configured in the Netlify dashboard.

# The copy editor now lives inside the Presentation Studio (its "Copy editor"
# overlay; #copy opens straight onto the live-deck editor). Redirect the old
# URLs so bookmarks keep working — the Studio itself is gated below.
[[redirects]]
  from = "/copy-editor.html"
  to = "/presentation-studio.html#copy"
  status = 301

[[redirects]]
  from = "/copy-editor"
  to = "/presentation-studio.html#copy"
  status = 301

# The Presentation Studio is an authoring tool — gate it behind the password.
[[edge_functions]]
  path = "/presentation-studio.html"
  function = "editor-auth"

[[edge_functions]]
  path = "/presentation-studio"
  function = "editor-auth"

# The NorthStar 2.0 viewer and the two overview pages it embeds — gated the
# same way. The sign-in cookie is site-wide, so unlocking the viewer also
# unlocks the embedded frames.
[[edge_functions]]
  path = "/northstar-2.html"
  function = "editor-auth"

[[edge_functions]]
  path = "/northstar-2"
  function = "editor-auth"

[[edge_functions]]
  path = "/ns2.0-detailed.html"
  function = "editor-auth"

[[edge_functions]]
  path = "/ns2.0-detailed"
  function = "editor-auth"

[[edge_functions]]
  path = "/ns2.0-basic.html"
  function = "editor-auth"

[[edge_functions]]
  path = "/ns2.0-basic"
  function = "editor-auth"

# The NorthStar roadmap — gated the same way.
[[edge_functions]]
  path = "/roadmap.html"
  function = "editor-auth"

[[edge_functions]]
  path = "/roadmap"
  function = "editor-auth"

# The Slide Converter is an authoring tool — gate it the same way.
[[edge_functions]]
  path = "/slide-converter.html"
  function = "editor-auth"

[[edge_functions]]
  path = "/slide-converter"
  function = "editor-auth"
