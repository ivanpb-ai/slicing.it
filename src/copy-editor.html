<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>NorthStar — Copy Editor</title>
  <style>
    :root {
      --deep: #29003E; --dark: #3D1556; --card: #4A1969; --purple: #990AE3;
      --light: #F4E0FF; --cyan: #00D4FF; --line: rgba(244,224,255,0.16);
      --dim: rgba(244,224,255,0.65);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--deep); color: var(--light);
      font-family: 'Telia Sans', system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5;
    }
    header {
      position: sticky; top: 0; z-index: 5; background: rgba(41,0,62,0.96);
      backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); padding: 14px 20px;
    }
    h1 { margin: 0 0 2px; font-size: 18px; font-weight: 600; }
    .sub { margin: 0; color: var(--dim); font-size: 12.5px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; align-items: center; }
    button {
      font: inherit; cursor: pointer; border-radius: 8px; padding: 8px 14px; border: 1px solid var(--line);
      background: var(--card); color: var(--light); transition: background .15s, border-color .15s;
    }
    button:hover { border-color: var(--cyan); }
    button.primary { background: var(--purple); border-color: var(--purple); color: #fff; font-weight: 600; }
    button.primary:hover { background: #b01ff5; }
    .filter { margin-left: auto; }
    .filter input {
      font: inherit; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--line);
      background: rgba(0,0,0,0.25); color: var(--light); width: 220px;
    }
    main { padding: 18px 20px 80px; max-width: 1000px; margin: 0 auto; }
    details {
      border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden;
      background: rgba(0,0,0,0.14);
    }
    summary {
      cursor: pointer; padding: 12px 16px; font-weight: 600; font-size: 15px;
      list-style: none; user-select: none; background: rgba(255,255,255,0.03);
      display: flex; align-items: baseline; gap: 8px;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: "▸"; color: var(--cyan); }
    details[open] > summary::before { content: "▾"; }
    .sec-title { flex: 1; }
    .sec-key { font-family: ui-monospace, monospace; font-size: 11px; color: var(--dim); opacity: 0.7; }
    .group-body { padding: 8px 16px 16px; }
    .subgroup { border-left: 2px solid var(--line); padding-left: 12px; margin: 14px 0; }
    .subhead { font-size: 12px; font-weight: 600; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .field { display: block; margin: 12px 0; }
    .field.hidden, .item-card.hidden { display: none; }
    .lab { display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px; margin-bottom: 4px; }
    .lab.inline { margin-bottom: 0; }
    .lab-name { font-size: 12.5px; color: var(--light); font-weight: 500; }
    .lab-badge { font-size: 10px; color: var(--cyan); border: 1px solid var(--line); border-radius: 999px; padding: 0 7px; }
    .lab-path { font-size: 10.5px; color: var(--dim); font-family: ui-monospace, monospace; opacity: 0.55; word-break: break-all; }
    /* Repeating-block collections */
    .collection { margin: 14px 0; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: rgba(0,0,0,0.10); }
    .coll-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .coll-title { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .coll-title .count { font-size: 11px; color: var(--dim); background: rgba(0,0,0,0.3); border-radius: 999px; padding: 1px 8px; font-family: ui-monospace, monospace; }
    .coll-head .add { margin-left: auto; }
    button.mini { padding: 5px 11px; font-size: 12.5px; border-radius: 7px; }
    button.mini.add { background: rgba(153,10,227,0.25); border-color: var(--purple); }
    button.mini.add:hover { background: var(--purple); }
    .coll-list { display: flex; flex-direction: column; gap: 8px; }
    .item-card { border: 1px solid var(--line); border-radius: 9px; background: rgba(255,255,255,0.02); overflow: hidden; }
    .card-head { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: rgba(255,255,255,0.03); }
    .card-title { flex: 1; font-size: 12.5px; color: var(--light); font-weight: 600; }
    .card-body { padding: 4px 12px 10px; }
    .controls { display: flex; gap: 4px; flex: none; }
    .icon-btn { padding: 3px 8px; font-size: 13px; line-height: 1; border-radius: 6px; }
    .icon-btn:disabled { opacity: 0.3; cursor: default; }
    .scalar-row { display: flex; align-items: center; gap: 6px; }
    .scalar-row .grow { flex: 1; font: inherit; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--line); background: rgba(0,0,0,0.28); color: var(--light); }
    .scalar-row .grow:focus { outline: none; border-color: var(--cyan); }
    .collection[data-coupled] .coll-title::after { content: "fixed length"; font-size: 10px; color: var(--dim); font-weight: 400; border: 1px solid var(--line); border-radius: 999px; padding: 0 7px; }
    /* Rich-text fragments */
    .rich-box { display: flex; flex-direction: column; gap: 6px; border: 1px dashed var(--line); border-radius: 9px; padding: 10px; }
    .seg { display: flex; flex-direction: column; gap: 6px; padding: 7px 9px; border-radius: 7px; background: rgba(0,212,255,0.05); }
    .seg-plain, .seg-text { width: 100%; font: inherit; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--line); background: rgba(0,0,0,0.28); color: var(--light); }
    .seg-plain:focus, .seg-text:focus { outline: none; border-color: var(--cyan); }
    .seg-extras { display: flex; flex-wrap: wrap; gap: 10px 18px; }
    .seg-extras .field { margin: 2px 0; }
    .seg-br { font-size: 11px; color: var(--dim); font-style: italic; padding: 2px 4px; }
    .grad-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .field.bool { display: flex; align-items: center; gap: 8px; }
    .field.bool input { width: 16px; height: 16px; }
    .field input[type=text], .field textarea {
      width: 100%; font: inherit; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--line); background: rgba(0,0,0,0.28); color: var(--light); resize: vertical;
    }
    .field input[type=text]:focus, .field textarea:focus { outline: none; border-color: var(--cyan); }
    .color-row { display: flex; align-items: center; gap: 10px; }
    .color-row select {
      font: inherit; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--line);
      background: rgba(0,0,0,0.28); color: var(--light); min-width: 160px;
    }
    .swatch { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--line); flex: none; }
    .out { margin-top: 14px; }
    .out textarea {
      width: 100%; min-height: 320px; font-family: ui-monospace, 'SFMono-Regular', monospace; font-size: 12.5px;
      padding: 12px; border-radius: 10px; border: 1px solid var(--line); background: #1b0a28; color: var(--light);
    }
    .note { color: var(--dim); font-size: 12.5px; }
    .note code { background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 4px; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--cyan); color: #04222b; font-weight: 600; padding: 10px 18px; border-radius: 10px;
      opacity: 0; transition: opacity .2s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <h1>NorthStar — Copy Editor</h1>
    <p class="sub">Edit the presentation's text &amp; section colours, then export an updated <code>copy.js</code>.</p>
    <div class="toolbar">
      <button id="expand">Expand all</button>
      <button id="collapse">Collapse all</button>
      <button id="generate" class="primary">Generate copy.js ↓</button>
      <button id="copy">Copy</button>
      <button id="download">Download copy.js</button>
      <span class="filter"><input id="filter" type="text" placeholder="Filter fields…" /></span>
    </div>
  </header>
  <main>
    <p class="note" id="intro"></p>
    <div id="form"></div>
    <div class="out" id="out" hidden>
      <p class="note">Copy this into <code>src/js/copy.js</code> (or download it), then commit &amp; rebuild.</p>
      <textarea id="output" spellcheck="false" readonly></textarea>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <script type="module" src="./js/copy-editor.js"></script>
</body>
</html>
